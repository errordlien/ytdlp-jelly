name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build plugin
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish YtDlpJellyfin.Plugin/YtDlpJellyfin.Plugin.csproj \
            -c Release \
            -o artifacts/plugin \
            /p:Version="$VERSION"

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd artifacts/plugin
          zip -r "../ytdlp-jelly_${VERSION}.zip" .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/ytdlp-jelly_*.zip
